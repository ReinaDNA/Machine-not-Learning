<!DOCTYPE html>
<html>
    <head>
        <title>Pre-Setup</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <style>
                p {
                    font-family: Roboto;
                    margin-top: 0px;
                    margin-bottom: 5px;
                }

                .brand {
                    display: inline-flex;
                    align-items: center;
                    margin-left: 50px;
                    margin-top: -10px;
                    margin-bottom: -10px;
                }

                .logo-grid {
                    display: grid;
                    grid-template-columns: repeat(2, 1fr);
                    gap: 3px;
                    margin-right: 10px;
                }

                .dot {
                width: 12px;
                height: 12px;
                border-radius: 50%;
                }

                .red {
                background: #ff5e57;
                }

                .green {
                background: #9be36b;
                }

                .blue {
                background: #68c7f5;
                }

                .yellow {
                background: #e8ea58;
                }

                .title {
                    font-family: Roboto;
                    font-size: 30px;
                    font-weight:bold;
                    color: #000000;
                }

                .greg-profile {
                    display: inline-flex;
                    align-items: center;
                    margin-left: 75px;
                }

                .greg-pic{
                    width: 75px;
                    height: 75px;
                    padding: 1px;
                    background-color: #d9d9d9;
                    border-radius: 50%;
                }

                .greg-talks{
                    font-size: 20px;
                    font-weight: 700;
                    margin-left: 15px;

                }

                .content-block{
                    display: block;
                    margin-top: 20px;
                    margin-left: 75px;
                    background-size: 30px;
                    background-color: #68c7f5;
                    padding: 20px;
                    border-radius: 10px;
                }

                .location{
                    font-size: 15px;
                }

                input{
                    margin-top: 5px;
                    margin-bottom: 30px;
                    padding-inline: 10px;
                    padding-block: 5px;
                    border: none;
                    border-radius: 50px;
                }

                .land-size{
                    display: inline;
                }

                .input-height, .input-width{
                    width: 80px;
                }

                .input-height, .multiply, .input-width, .unit{
                    display: inline;
                }


        </style>
    </head>

    <body>
        <div class="brand">
            <div class="logo-grid" aria-hidden="true">
                    <span class="dot red"></span>
                    <span class="dot green"></span>
                    <span class="dot blue"></span>
                    <span class="dot yellow"></span>
            </div>
            <h1 class="title">Elementals.</h1>
        </div>

    <br></br>

        <div class="greg-profile">
            <img class="greg-pic" src="templates/image/ailogo.png">
            <p class="greg-talks">Let's do a quick check before we start.</p>
        </div>

        <div class="content-block">
            <div class="location">
                <p>Location</p>
                <input class="input-location" type="text">
            </div>
            <div class="land-size">
                <p>Land size</p>
                <input class="input-height" type="number">
                <p class="multiply">&times</p>
                <input class="input-width" type="number">
                <p class="unit">m</p>
            </div>
        </div>
    </body>
</html>
