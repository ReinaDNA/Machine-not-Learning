<!DOCTYPE html>
<html>
<head>
    <title>Elementals</title>
    <style>
        .title {
            font-size: 25px;
        }

        .ai {
            width: 50px;
            height: 50px;
            background-color: rgb(215, 215, 215);
            border-radius: 50%;
            border: none;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .ai:hover{
            box-shadow: 5px 5px 5px rgba(0,0,0,0.3);
        }


        .ai img {
            width: 30px;
            height: 30px;
        }
    </style>
</head>

<body>
    <h1 class="title">Elementals</h1>

    <button class="ai">
      <img src="./image/logo.png" alt="logo">
    </button>

    <h1 class="weather">
      Today's Weather
    </h1>

    <div style="width: 200px; height: 100px; background-color: #433965; border-radius: 25px;"></div>

</body>
</html>
